services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in badminton-infra/.env or the shell environment}
    environment:
      CLOUDFLARED_TOKEN: ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in badminton-infra/.env or the shell environment}
    depends_on:
      - badminton-frontend
