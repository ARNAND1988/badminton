<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title>Nieuwegein Badminton</title>
  <desc>Premium circular Nieuwegein Badminton logo with crossed rackets and shuttle</desc>
  <defs>
    <radialGradient id="navyGlow" cx="38%" cy="30%" r="70%">
      <stop offset="0" stop-color="#1f4f7a"/>
      <stop offset="0.45" stop-color="#0d2540"/>
      <stop offset="1" stop-color="#020814"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="electricBlue" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity=".55"/>
    </filter>
    <path id="topArc" d="M 92 242 A 164 164 0 0 1 420 242"/>
    <path id="bottomArc" d="M 420 288 A 164 164 0 0 1 92 288"/>
    <g id="smallShuttle">
      <path d="M0 0 L36 -18 L42 -5 L5 9 Z" fill="url(#chrome)" stroke="#0f172a" stroke-width="2"/>
      <path d="M6 6 L36 -11 M11 3 L39 -3 M16 0 L38 5" stroke="#64748b" stroke-width="2"/>
    </g>
  </defs>

  <rect width="512" height="512" fill="#071525"/>
  <g opacity=".16" stroke="#60a5fa" stroke-width="2" fill="none">
    <path d="M-20 80h90l45 78-45 78h-90"/><path d="M385 32h90l45 78-45 78h-90l-45-78z"/>
    <path d="M355 340h90l45 78-45 78h-90l-45-78z"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="256" cy="256" r="232" fill="#06101f" stroke="url(#chrome)" stroke-width="6"/>
    <circle cx="256" cy="256" r="218" fill="url(#navyGlow)" stroke="#1d4ed8" stroke-width="6"/>
    <circle cx="256" cy="256" r="176" fill="#020814" stroke="url(#chrome)" stroke-width="5"/>
    <circle cx="256" cy="256" r="164" fill="none" stroke="#2563eb" stroke-width="7"/>

    <g fill="#f8fafc" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="8">
      <text font-size="42"><textPath href="#topArc" startOffset="50%" text-anchor="middle">NIEUWEGEIN</textPath></text>
      <text font-size="42"><textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BADMINTON</textPath></text>
    </g>

    <g transform="translate(88 173)"><use href="#smallShuttle"/><use href="#smallShuttle" transform="translate(-5 52) rotate(8)"/><use href="#smallShuttle" transform="translate(0 103) rotate(16)"/></g>
    <g transform="translate(424 173) scale(-1 1)"><use href="#smallShuttle"/><use href="#smallShuttle" transform="translate(-5 52) rotate(8)"/><use href="#smallShuttle" transform="translate(0 103) rotate(16)"/></g>

    <path d="M92 322 C152 226 184 207 242 199" fill="none" stroke="url(#chrome)" stroke-width="18" stroke-linecap="round"/>
    <path d="M270 199 C328 207 360 226 420 322" fill="none" stroke="url(#chrome)" stroke-width="18" stroke-linecap="round"/>

    <g transform="rotate(-24 190 246)">
      <ellipse cx="166" cy="162" rx="48" ry="74" fill="none" stroke="url(#electricBlue)" stroke-width="12"/>
      <ellipse cx="166" cy="162" rx="39" ry="62" fill="none" stroke="#e5e7eb" stroke-width="4"/>
      <g stroke="#f8fafc" stroke-width="3" opacity=".92">
        <path d="M132 121 L199 205"/><path d="M145 103 L209 189"/><path d="M162 93 L215 168"/><path d="M181 98 L207 143"/>
        <path d="M117 153 L201 112"/><path d="M119 176 L213 133"/><path d="M130 199 L215 160"/>
      </g>
      <path d="M188 231 L228 322" stroke="#60a5fa" stroke-width="13" stroke-linecap="round"/>
      <path d="M222 311 L241 356" stroke="#e5e7eb" stroke-width="11" stroke-linecap="round"/>
    </g>
    <g transform="rotate(24 322 246)">
      <ellipse cx="346" cy="162" rx="48" ry="74" fill="none" stroke="url(#electricBlue)" stroke-width="12"/>
      <ellipse cx="346" cy="162" rx="39" ry="62" fill="none" stroke="#e5e7eb" stroke-width="4"/>
      <g stroke="#f8fafc" stroke-width="3" opacity=".92">
        <path d="M312 121 L379 205"/><path d="M325 103 L389 189"/><path d="M342 93 L395 168"/><path d="M361 98 L387 143"/>
        <path d="M297 153 L381 112"/><path d="M299 176 L393 133"/><path d="M310 199 L395 160"/>
      </g>
      <path d="M324 231 L284 322" stroke="#60a5fa" stroke-width="13" stroke-linecap="round"/>
      <path d="M290 311 L271 356" stroke="#e5e7eb" stroke-width="11" stroke-linecap="round"/>
    </g>

    <g>
      <path d="M214 261 L298 261 L282 377 L230 377 Z" fill="url(#chrome)" stroke="#020617" stroke-width="6"/>
      <path d="M224 261 L237 377 M240 261 L247 377 M256 261 L256 377 M272 261 L265 377 M288 261 L275 377" stroke="#020617" stroke-width="4"/>
      <ellipse cx="256" cy="389" rx="29" ry="22" fill="#e5e7eb" stroke="#020617" stroke-width="6"/>
    </g>
  </g>
</svg>
