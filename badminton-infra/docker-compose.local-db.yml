services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: badminton
      POSTGRES_USER: badminton_user
      POSTGRES_PASSWORD: strongpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  postgres_local_data:
